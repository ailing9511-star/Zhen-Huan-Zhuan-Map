<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>甄嬛传后宫人物星图</title>
  <style>
    :root {
      --bg: #050506;
      --ink: #f3eee2;
      --muted: #a9a092;
      --line: rgba(255, 255, 255, 0.13);
      --panel: rgba(8, 9, 11, 0.76);
      --panel-strong: rgba(10, 11, 13, 0.92);
      --gold: #d8b45f;
      --jade: #75c9b3;
      --rose: #d97984;
      --cyan: #73b9d7;
      --violet: #a993df;
      --red: #d26050;
      --amber: #d79a55;
      font-family: "Songti SC", "STSong", "Noto Serif SC", serif;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      background:
        radial-gradient(circle at 48% 48%, rgba(126, 82, 44, 0.13), transparent 32%),
        radial-gradient(circle at 66% 38%, rgba(76, 113, 136, 0.1), transparent 28%),
        radial-gradient(circle at 35% 58%, rgba(118, 65, 89, 0.08), transparent 30%),
        #050506;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    canvas.dragging { cursor: grabbing; }

    .topbar {
      position: fixed;
      top: 16px;
      left: 50%;
      z-index: 12;
      width: min(1040px, calc(100vw - 24px));
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 14px;
      align-items: start;
      pointer-events: none;
    }

    .hint {
      justify-self: start;
      margin-top: 6px;
      color: rgba(243, 238, 226, 0.56);
      font: 12px/1.5 system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: 0;
      pointer-events: none;
    }

    .title-card {
      min-width: 294px;
      padding: 12px 16px 14px;
      border: 1px solid rgba(216, 180, 95, 0.28);
      border-radius: 8px;
      background: rgba(7, 7, 8, 0.72);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.42), inset 0 0 22px rgba(216, 180, 95, 0.06);
      text-align: center;
      pointer-events: auto;
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 7px;
      max-width: 420px;
    }

    button, input {
      font: 600 13px/1 system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .tab, .pill, .icon-btn, .search input {
      min-height: 34px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 999px;
      background: rgba(9, 10, 12, 0.7);
      color: var(--muted);
      outline: none;
    }

    .tab {
      padding: 0 12px;
      cursor: pointer;
    }

    .tab.active, .pill.active {
      color: #2d220b;
      border-color: rgba(248, 221, 139, 0.68);
      background: linear-gradient(180deg, #f0d47c, #b88631);
      box-shadow: 0 0 20px rgba(216, 180, 95, 0.28);
    }

    .search {
      justify-self: end;
      position: relative;
      width: min(290px, 30vw);
      pointer-events: auto;
    }

    .search input {
      width: 100%;
      color: var(--ink);
      background: rgba(8, 9, 11, 0.78);
      padding: 0 16px;
      backdrop-filter: blur(8px);
    }

    .search input::placeholder { color: rgba(243, 238, 226, 0.45); }

    .suggest {
      position: absolute;
      top: 42px;
      right: 0;
      display: none;
      width: min(360px, 88vw);
      max-height: 330px;
      overflow: auto;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 8px;
      background: var(--panel-strong);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    .suggest button {
      width: 100%;
      padding: 10px 12px;
      border: 0;
      color: var(--ink);
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .suggest strong {
      display: block;
      margin-bottom: 4px;
      font-weight: 650;
    }

    .suggest button:hover { background: rgba(216, 180, 95, 0.12); }
    .suggest small { display: block; color: var(--muted); }

    .panel {
      position: fixed;
      top: 108px;
      right: 16px;
      bottom: 132px;
      z-index: 10;
      width: 354px;
      max-width: calc(100vw - 32px);
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.46);
      backdrop-filter: blur(12px);
      transform: translateX(390px);
      opacity: 0;
      transition: transform 240ms ease, opacity 240ms ease;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .panel.open {
      transform: translateX(0);
      opacity: 1;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 13px;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .panel h2 {
      margin: 0 0 7px;
      font: 700 28px/1.1 "Songti SC", "STSong", serif;
    }

    .panel p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .close {
      flex: 0 0 auto;
      width: 30px;
      height: 30px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 50%;
      color: var(--muted);
      background: rgba(0, 0, 0, 0.22);
      cursor: pointer;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 12px;
    }

    .badge {
      padding: 5px 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      color: rgba(243, 238, 226, 0.82);
      background: rgba(255, 255, 255, 0.05);
      font-size: 12px;
    }

    .section-title {
      margin: 15px 0 8px;
      color: var(--gold);
      font: 700 13px/1 system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .rel-list {
      display: grid;
      gap: 8px;
      max-height: min(280px, 36vh);
      overflow: auto;
      padding-right: 4px;
    }

    .rel-item {
      padding: 4px 0 4px 10px;
      border-left: 2px solid rgba(216, 180, 95, 0.45);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .rel-item b { color: var(--ink); font-weight: 650; }

    .tooltip {
      position: fixed;
      z-index: 20;
      display: none;
      max-width: 260px;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(6, 7, 9, 0.9);
      box-shadow: 0 14px 42px rgba(0, 0, 0, 0.45);
      pointer-events: none;
      font: 12px/1.55 system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .bottom {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 9;
      min-height: 118px;
      padding: 16px clamp(14px, 3vw, 40px) 18px;
      display: grid;
      grid-template-columns: minmax(280px, 1fr) auto minmax(250px, 1fr);
      gap: 18px;
      align-items: end;
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.72) 24%, rgba(0, 0, 0, 0.93));
      pointer-events: none;
    }

    .important, .controls, .stats { pointer-events: auto; }

    .important {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px 14px;
      font: 13px/1.35 system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--muted);
    }

    .important button {
      min-width: 0;
      padding: 0;
      border: 0;
      color: inherit;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 8px;
      text-align: left;
      cursor: pointer;
    }

    .important span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .dot {
      width: 7px;
      height: 7px;
      flex: 0 0 auto;
      border-radius: 50%;
      box-shadow: 0 0 12px currentColor;
    }

    .controls {
      justify-self: center;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 9px;
      max-width: 420px;
    }

    .pill {
      padding: 0 14px;
      cursor: pointer;
      background: rgba(13, 14, 16, 0.78);
    }

    .stats {
      justify-self: end;
      min-width: 230px;
      display: grid;
      gap: 6px;
      color: var(--muted);
      font: 13px/1.45 system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .stat-line {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      padding-bottom: 5px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .stat-line strong { color: var(--ink); font-weight: 650; }

    @media (max-width: 780px) {
      .topbar {
        top: 10px;
        grid-template-columns: 1fr;
        justify-items: center;
        gap: 9px;
      }

      .hint { display: none; }

      .title-card {
        width: min(430px, calc(100vw - 24px));
        min-width: 0;
      }

      h1 { font-size: 24px; }

      .search {
        justify-self: center;
        width: min(430px, calc(100vw - 24px));
      }

      .panel {
        top: 150px;
        right: 10px;
        bottom: 138px;
        width: calc(100vw - 20px);
      }

      .bottom {
        grid-template-columns: 1fr;
        min-height: 132px;
        gap: 10px;
        padding: 12px 12px 14px;
      }

      .important {
        order: 2;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        font-size: 12px;
      }

      .stats { display: none; }
      .pill, .tab { font-size: 12px; padding-inline: 10px; }
    }
  </style>
</head>

    function hash(str) {
      let n = 2166136261;
      for (let i = 0; i < str.length; i++) {
        n ^= str.charCodeAt(i);
        n = Math.imul(n, 16777619);
      }
      return (n >>> 0) / 4294967295;
    }

    function resize() {

    function categoryIndex(category) {
      const index = categoryOrder.indexOf(category);
      return index < 0 ? 9 : index;

    function basePosition(node) {
      const deg = degree.get(node.id) || 1;
      const cIndex = categoryIndex(node.category);
      const band = coreIds.has(node.id) ? 68 : 175 + cIndex * 10;
      const angle = cIndex * 0.56 + node.importance * 0.22 + hash(node.id) * 1.8;
      const spiral = band + (hash(node.name + node.category) - 0.5) * 90 - Math.min(deg, 40) * 1.25;
      const x = Math.cos(angle) * spiral + (hash(node.id + 'x') - 0.5) * 70;
      const z = Math.sin(angle) * spiral + (hash(node.id + 'z') - 0.5) * 70;
      const y = layered
        ? (cIndex - 6) * 23 + (hash(node.id + 'layer') - 0.5) * 28
        : Math.sin(angle * 1.7) * 88 + (hash(node.id + 'y') - 0.5) * 90;
      if (node.id === 'zhenhuan') return { x: 0, y: -8, z: 0 };
      if (node.id === 'emperor') return { x: 45, y: -18, z: 18 };
      if (node.id === 'empress') return { x: -76, y: -18, z: 28 };
      if (node.id === 'huafei') return { x: 78, y: 42, z: -38 };
      if (node.id === 'meizhuang') return { x: -52, y: 45, z: -30 };
      if (node.id === 'anlingrong') return { x: 14, y: 76, z: 56 };
      if (node.id === 'guojunwang') return { x: 108, y: -58, z: 62 };
      if (node.id === 'wenshichu') return { x: -104, y: 56, z: 58 };
      return { x, y, z };
    }

    function project(node) {
      const p = basePosition(node);
      const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
      const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
      const x1 = p.x * cosY - p.z * sinY;
      const z1 = p.x * sinY + p.z * cosY;
      const y1 = p.y * cosX - z1 * sinX;
      const z2 = p.y * sinX + z1 * cosX;
      const depth = 760;
      const scale = depth / (depth + z2);
      const fit = Math.min(w, h) / 760;
      return {
        id: node.id,
        x: w * 0.5 + x1 * scale * fit * 1.25 * zoom,
        y: h * 0.5 + y1 * scale * fit * 1.25 * zoom,
        z: z2,
        scale
      };
    }

    function isVisible(node) {
      return filter === '全部' || node.category === filter;
    }

    function visibleAlpha(node) {
      if (!isVisible(node)) return 0.055;
      if (selected === node.id || hover === node.id) return 1;
      if (selected) {
        const related = edges.some(edge =>
          (edge.source === selected && edge.target === node.id) ||
          (edge.target === selected && edge.source === node.id)
        );
        if (related) return 0.92;
        return filter === '全部' ? 0.42 : 0.7;
      }
      return 0.78;
    }

    function nodeRadius(node) {
      const deg = degree.get(node.id) || 1;
      const normal = 2.1 + Math.min(Math.sqrt(deg) * 0.36, 1.8);
      const boosted = normal + (coreIds.has(node.id) ? 2.2 : node.importance >= 8 ? 1.1 : 0);
      return Math.min(boosted, 6.2);
    }

        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();

    }

    function draw() {
      rotX += (targetRotX - rotX) * 0.08;
      rotY += (targetRotY - rotY) * 0.08;
      zoom += (targetZoom - zoom) * 0.08;
      if (autoRotate && !dragging) targetRotY += 0.0012;

      drawBackground();
      screenNodes = nodes.map(node => ({ ...project(node), node }));
      const screenById = new Map(screenNodes.map(item => [item.id, item]));

      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      edges.forEach(edge => {
        const a = screenById.get(edge.source);
        const b = screenById.get(edge.target);
        if (!a || !b) return;
        const sourceVisible = isVisible(a.node);
        const targetVisible = isVisible(b.node);
        const connectedFocus = selected && (edge.source === selected || edge.target === selected);
        const connectedHover = hover && (edge.source === hover || edge.target === hover);
        const alpha = connectedFocus || connectedHover ? 0.42 : (sourceVisible && targetVisible ? 0.13 : 0.035);
        const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
        const ca = colors[a.node.category] || palette.neutral;
        const cb = colors[b.node.category] || palette.neutral;
        grad.addColorStop(0, `${ca}${Math.floor(alpha * 255).toString(16).padStart(2, '0')}`);
        grad.addColorStop(0.72, `${cb}${Math.floor(alpha * 160).toString(16).padStart(2, '0')}`);
        grad.addColorStop(1, 'rgba(255,255,255,0.01)');
        ctx.strokeStyle = grad;
        ctx.lineWidth = connectedFocus || connectedHover ? 0.9 : 0.45;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      });
      ctx.restore();

      const ordered = screenNodes.slice().sort((a, b) => a.z - b.z);
      ordered.forEach(item => {
        const node = item.node;
        const alpha = visibleAlpha(node);
        const color = colors[node.category] || palette.neutral;
        const r = nodeRadius(node) * (0.82 + item.scale * 0.22);
        const active = selected === node.id || hover === node.id;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.globalCompositeOperation = 'lighter';
        const glow = ctx.createRadialGradient(item.x, item.y, 0, item.x, item.y, r * (active ? 5.4 : 3.5));
        glow.addColorStop(0, color);
        glow.addColorStop(0.18, `${color}cc`);
        glow.addColorStop(0.55, `${color}38`);
        glow.addColorStop(1, `${color}00`);

        ctx.beginPath();
        ctx.arc(item.x, item.y, r * (active ? 5.4 : 3.5), 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(item.x, item.y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255, 250, 222, 0.88)';
        ctx.beginPath();
        ctx.arc(item.x - r * 0.22, item.y - r * 0.22, Math.max(0.7, r * 0.32), 0, Math.PI * 2);

          ctx.restore();

    function pick(x, y) {
      let best = null;
      let bestD = Infinity;
      for (const item of screenNodes) {
        if (!isVisible(item.node)) continue;
        const r = Math.max(9, nodeRadius(item.node) + 5);
        const d = Math.hypot(item.x - x, item.y - y);
        if (d < r && d < bestD) {
          best = item;
          bestD = d;
        }
      }
      return best;
    }

      if (filter !== '全部' && node.category !== filter) setFilter('全部');
      document.getElementById('focusName').textContent = node.name;
      openPanel(node);
      renderImportant();
      renderTabs();
    }

    function openPanel(node) {
      const rels = edges
        .filter(edge => edge.source === node.id || edge.target === node.id)
        .map(edge => {
          const otherId = edge.source === node.id ? edge.target : edge.source;
          const other = byId.get(otherId);
          return { other, edge };
        })
        .filter(item => item.other)
        .sort((a, b) => (degree.get(b.other.id) || 0) - (degree.get(a.other.id) || 0))
        .slice(0, 14);

      document.getElementById('pName').textContent = node.name;
      document.getElementById('pSub').textContent = `${node.rank} · ${node.category}`;
      document.getElementById('pBadges').innerHTML = [
        `职位：${node.position}`,
        `名分：${node.rank}`,
        `身份：${node.identity}`,
        `宫殿：${node.palace}`,
        `称号：${node.alias}`
      ].map(text => `<span class="badge">${text}</span>`).join('');
      document.getElementById('pBio').textContent = node.bio;
      document.getElementById('pRelations').innerHTML = rels.length
        ? rels.map(({ other, edge }) => `<div class="rel-item"><b>${other.name}</b>：${edge.relation}<br>${edge.event}</div>`).join('')
        : '<div class="rel-item">暂无直接关系。</div>';
      panel.classList.add('open');
    }

    function renderTabs() {
      const root = document.getElementById('tabs');
      root.innerHTML = categoryOrder.map(category => (
        `<button class="tab${category === filter ? ' active' : ''}" data-category="${category}">${category}</button>`
      )).join('');
      root.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => setFilter(btn.dataset.category));
      });
    }

    function setFilter(category) {
      filter = category;
      renderTabs();
      renderImportant();
    }

    function renderImportant() {
      const list = nodes
        .filter(node => filter === '全部' || node.category === filter)
        .sort((a, b) => {
          const da = degree.get(a.id) || 0;
          const db = degree.get(b.id) || 0;
          if (db !== da) return db - da;
          return b.importance - a.importance;
        })
        .slice(0, 10);
      document.getElementById('important').innerHTML = list.map(node => {
        const color = colors[node.category] || palette.neutral;
        const active = selected === node.id ? ` style="color:${palette.core}"` : '';
        return `<button data-id="${node.id}"${active}><span class="dot" style="background:${color};color:${color}"></span><span>${node.name} · ${degree.get(node.id) || 0}</span></button>`;
      }).join('');
      document.querySelectorAll('#important button').forEach(btn => {
        btn.addEventListener('click', () => focusNode(btn.dataset.id));
      });
    }

    function updateSuggestions() {
      const q = search.value.trim().toLowerCase();
      if (!q) {
        suggest.style.display = 'none';
        return;
      }
      const list = nodes.filter(node => [
        node.name, node.alias, node.category, node.rank, node.role, node.identity, node.palace, node.position
      ].some(value => String(value).toLowerCase().includes(q))).slice(0, 14);
      suggest.innerHTML = list.map(node => (
        `<button data-id="${node.id}"><strong>${node.name}</strong><small>${node.rank} · ${node.category} · ${node.position}</small></button>`
      )).join('');
      suggest.style.display = list.length ? 'block' : 'none';
      suggest.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          search.value = '';
          suggest.style.display = 'none';
          focusNode(btn.dataset.id);
        });
      });
    }

    canvas.addEventListener('pointerdown', event => {
      dragging = true;
      lastX = event.clientX;
      lastY = event.clientY;
      canvas.classList.add('dragging');
      canvas.setPointerCapture(event.pointerId);
    });

    canvas.addEventListener('pointermove', event => {
      const hit = pick(event.clientX, event.clientY);
      hover = hit ? hit.id : null;
      if (hit && !dragging) {
        tooltip.style.display = 'block';
        tooltip.style.left = `${event.clientX + 14}px`;
        tooltip.style.top = `${event.clientY + 12}px`;
        tooltip.innerHTML = `<b>${hit.node.name}</b><br>${hit.node.rank} · ${hit.node.category}<br>${hit.node.alias}`;
      } else {
        tooltip.style.display = 'none';
      }
      if (!dragging) return;
      const dx = event.clientX - lastX;
      const dy = event.clientY - lastY;
      targetRotY += dx * 0.006;
      targetRotX += dy * 0.005;
      targetRotX = Math.max(-1.15, Math.min(1.15, targetRotX));
      lastX = event.clientX;
      lastY = event.clientY;
    });

    canvas.addEventListener('pointerup', event => {
      dragging = false;
      canvas.classList.remove('dragging');
      canvas.releasePointerCapture(event.pointerId);
      const hit = pick(event.clientX, event.clientY);
      if (hit) focusNode(hit.id);
    });

    canvas.addEventListener('pointerleave', () => {
      hover = null;
      tooltip.style.display = 'none';
    });

    canvas.addEventListener('wheel', event => {
      event.preventDefault();
      const direction = event.deltaY > 0 ? -1 : 1;
      targetZoom = Math.max(0.58, Math.min(2.25, targetZoom + direction * 0.09));
    }, { passive: false });

    document.getElementById('autoBtn').addEventListener('click', event => {
      autoRotate = !autoRotate;
      event.currentTarget.textContent = autoRotate ? '停止旋转' : '开始旋转';
      event.currentTarget.classList.toggle('active', autoRotate);
    });

    document.getElementById('layoutBtn').addEventListener('click', event => {
      layered = !layered;
      event.currentTarget.textContent = layered ? '星云布局' : '分层布局';
      event.currentTarget.classList.toggle('active', layered);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      targetRotX = -0.22;
      targetRotY = 0.42;
      targetZoom = 1;
      setFilter('全部');
      focusNode('zhenhuan');
    });

    document.getElementById('closePanel').addEventListener('click', () => panel.classList.remove('open'));
    search.addEventListener('input', updateSuggestions);
    window.addEventListener('resize', resize);
    document.addEventListener('click', event => {
      if (!event.target.closest('.search')) suggest.style.display = 'none';
    });

    document.getElementById('nodeCount').textContent = `${nodes.length} 个`;
    document.getElementById('edgeCount').textContent = `${edges.length} 条`;
    renderTabs();
    renderImportant();
    resize();
    focusNode('zhenhuan');
    requestAnimationFrame(draw);
  </script>
</body>
</html>
